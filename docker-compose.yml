services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: iz_academy
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  # ── IZ COACH services ───────────────────────────────────────────────────

  n8n:
    image: n8nio/n8n:latest
    ports:
      - '5678:5678'
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

  iz-coach-api:
    build: ./iz-coach/backend
    ports:
      - '8000:8000'
    env_file:
      - ./iz-coach/backend/.env
    depends_on:
      - db

volumes:
  pgdata:
  n8n_data:
