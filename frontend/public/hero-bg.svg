    <path d="M 960 780 A 420 420 0 0 0 1720 780" fill="none" stroke="url(#arc-r)" stroke-width="1"   stroke-dasharray="3 10"/>
    <path d="M 870 200 A 500 500 0 0 1 1810 200" fill="none" stroke="#818CF8"     stroke-width="0.8" opacity="0.12"/>
