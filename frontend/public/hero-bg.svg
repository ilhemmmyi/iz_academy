<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8F7FF"/>
      <stop offset="55%" stop-color="#F3F0FF"/>
      <stop offset="100%" stop-color="#EEF4FF"/>
    </linearGradient>
    <radialGradient id="pool-r" cx="68%" cy="45%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#DDD6FE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#EDE9FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pool-bl" cx="12%" cy="92%" r="35%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#DBEAFE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pool-tl" cx="0%" cy="0%" r="38%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#E9D5FF" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#F5F3FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pool-mid" cx="50%" cy="110%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#BAE6FD" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#EFF5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="fblur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="72"/>
    </filter>
    <filter id="fblur2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="fblur3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.4" fill="#7C3AED" opacity="0.10"/>
    </pattern>
    <linearGradient id="mesh-line-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="40%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mesh-line-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="40%" stop-color="#A78BFA" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="30%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#818CF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arc-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arc-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="canvas">
      <rect width="1920" height="900"/>
    </clipPath>
  </defs>

  <rect width="1920" height="900" fill="url(#bg)"/>
  <rect width="1920" height="900" fill="url(#pool-r)"/>
  <rect width="1920" height="900" fill="url(#pool-bl)"/>
  <rect width="1920" height="900" fill="url(#pool-tl)"/>
  <rect width="1920" height="900" fill="url(#pool-mid)"/>

