    <line x1="650" y1="628" x2="670" y2="628" stroke="#A78BFA"  stroke-width="2" stroke-linecap="round" opacity="0.38"/>
    <line x1="1740" y1="700" x2="1740" y2="716" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" opacity="0.40"/>
