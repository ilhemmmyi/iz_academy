    <line x1="960"  y1="0" x2="960"  y2="900" stroke="url(#mesh-line-v)" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="900" stroke="url(#mesh-line-v)" stroke-width="1"/>
    <line x1="1280" y1="0" x2="1280" y2="900" stroke="url(#mesh-line-v)" stroke-width="1"/>
    <line x1="1440" y1="0" x2="1440" y2="900" stroke="url(#mesh-line-v)" stroke-width="1"/>
    <line x1="0" y1="300" x2="1920" y2="300" stroke="url(#mesh-line-h)" stroke-width="1"/>
    <line x1="0" y1="450" x2="1920" y2="450" stroke="url(#mesh-line-h)" stroke-width="1"/>
    <line x1="0" y1="600" x2="1920" y2="600" stroke="url(#mesh-line-h)" stroke-width="1"/>
