    <line x1="385" y1="480" x2="415" y2="480" stroke="#DDD6FE" stroke-width="0.9" opacity="0.40"/>
    <circle cx="1760" cy="170" r="220" fill="none" stroke="#C4B5FD" stroke-width="1"   opacity="0.10"/>
    <circle cx="1760" cy="170" r="300" fill="none" stroke="#DDD6FE" stroke-width="0.8" opacity="0.07"/>
